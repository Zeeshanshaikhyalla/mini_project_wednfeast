{% extends 'base.html' %}

{% block title %}Register | Wed n Feast{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-wrapper glass-panel">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join Wed n Feast to start planning or listing.</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name / Business Name</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>I want to:</label>
                    <div class="radio-group mt-2">
                        <label class="radio-label">
                            <input type="radio" name="role" value="user" checked>
                            Plan an Event (User)
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="role" value="vendor">
                            List my Service (Vendor)
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-large mt-4">Create Account</button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
